services:
  mongo:
    image: mongo:7
    container_name: ocpp-simulator-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: elixir:1.17-otp-27
    container_name: ocpp-simulator-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongo:27017/ocpp_simulator_dev
      PHX_SERVER: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    command: >
      sh -lc "mix local.hex --force &&
              mix local.rebar --force &&
              mix deps.get &&
              mix phx.server"

volumes:
  mongo_data:
